<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gala Night Lucky Draw</title>

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:#e8d8a8;
    background:radial-gradient(circle at top,#2a2a2a,#0c0c0c);
    text-align:center;
    overflow:hidden;
}

/* background particle canvas */
canvas#bg{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

h1{
    <h1 class="title">
<span>🍷</span>
<span>G</span>
<span>a</span>
<span>l</span>
<span>a</span>
&nbsp;
<span>N</span>
<span>i</span>
<span>g</span>
<span>h</span>
<span>t</span>
&nbsp;
<span>L</span>
<span>u</span>
<span>c</span>
<span>k</span>
<span>y</span>
&nbsp;
<span>D</span>
<span>r</span>
<span>a</span>
<span>w</span>
</h1>
}
.title span{
display:inline-block;
opacity:0;
transform:translateY(30px);
animation:titleReveal 0.6s forwards;
}

.title span:nth-child(1){animation-delay:.1s}
.title span:nth-child(2){animation-delay:.15s}
.title span:nth-child(3){animation-delay:.2s}
.title span:nth-child(4){animation-delay:.25s}
.title span:nth-child(5){animation-delay:.3s}
.title span:nth-child(6){animation-delay:.35s}
.title span:nth-child(7){animation-delay:.4s}
.title span:nth-child(8){animation-delay:.45s}
.title span:nth-child(9){animation-delay:.5s}
.title span:nth-child(10){animation-delay:.55s}

@keyframes titleReveal{
to{
opacity:1;
transform:translateY(0);
}
}
#roller{
    margin-top:80px;
    font-size:64px;
    height:100px;
    line-height:100px;
    text-shadow:0 0 20px rgba(255,230,170,0.6);
}

.winner{
    animation:glow .6s infinite alternate,zoom .6s infinite alternate;
}

@keyframes glow{
    from{opacity:1;}
    to{opacity:.4;}
}

@keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.3);}
}

button,select{
    margin:12px;
    padding:12px 30px;
    font-size:20px;
    border-radius:30px;
    border:none;
    background:linear-gradient(135deg,#e8d8a8,#cbb26a);
    cursor:pointer;
}

#admin{
    display:none;
    position:fixed;
    right:20px;
    bottom:20px;
    background:rgba(0,0,0,.85);
    padding:16px;
    border-radius:10px;
    font-size:14px;
}

.big #roller{
    font-size:110px;
    height:150px;
    line-height:150px;
}

/* winner summary page */
#endPage{
    display:none;
    padding-top:60px;
}

.prize-block{
    margin:30px auto;
    width:70%;
    background:rgba(255,255,255,.05);
    padding:20px;
    border-radius:16px;
}

.prize-block h2{
    margin-bottom:10px;
    color:#ffe6a0;
}

.name{
    font-size:26px;
    margin:6px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- Lucky Draw Page -->
<div id="drawPage">

<h1>🍷 Gala Night Lucky Draw</h1>

<div id="roller">READY</div>

<div>
<select id="prize">
<option value="First Prize">🏆 First Prize</option>
<option value="Second Prize">🥈 Second Prize</option>
<option value="Third Prize">🥉 Third Prize</option>
</select>
<br>
<button onclick="startDraw()">Start Draw</button>
<button onclick="showEnd()">Finish Event</button>
</div>

</div>

<!-- Winner Summary Page -->
<div id="endPage">

<h1>🎉 Winner Summary</h1>

<div class="prize-block">
<h2>🏆 First Prize</h2>
<div id="list1"></div>
</div>

<div class="prize-block">
<h2>🥈 Second Prize</h2>
<div id="list2"></div>
</div>

<div class="prize-block">
<h2>🥉 Third Prize</h2>
<div id="list3"></div>
</div>

</div>

<!-- Hidden Admin Panel -->
<div id="admin">
<label>
<input type="checkbox" id="cheatMode" checked>
Fixed Winner Mode
</label>
<br><br>
<button onclick="toggleBig()">Big Screen Mode</button>
</div>

<audio id="ding">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

/* PARTICIPANTS LIST */
const participants = [
"James",
"John",
"Robert",
"Michael",
"Mary",
"Elizabeth",
"Jennifer"
];

/* Fixed winner (for admin mode) */
const fixedWinner = "James";

let pool=[...participants];
let rolling=false;
let winners={
"First Prize":[],
"Second Prize":[],
"Third Prize":[]
};

let timer;

/* ADMIN PANEL HOTKEY
Ctrl + Shift + A
*/
document.addEventListener("keydown",e=>{
if(e.ctrlKey&&e.shiftKey&&e.key==="A"){
const admin=document.getElementById("admin");
admin.style.display=admin.style.display==="none"?"block":"none";
}
});

/* Start draw animation */
function startDraw(){

if(rolling||pool.length===0)return;

rolling=true;

const roller=document.getElementById("roller");
roller.classList.remove("winner");

let i=0;

timer=setInterval(()=>{
roller.innerText=pool[i%pool.length];
i++;
},50);

setTimeout(stopDraw,2500);
}

/* Stop draw and select winner */
function stopDraw(){

clearInterval(timer);

const prize=document.getElementById("prize").value;
const cheat=document.getElementById("cheatMode").checked;
const roller=document.getElementById("roller");

let winner;

if(cheat&&pool.includes(fixedWinner)){
winner=fixedWinner;
}else{
winner=pool[Math.floor(Math.random()*pool.length)];
}

roller.innerText=`🎉 ${prize}: ${winner} 🎉`;
roller.classList.add("winner");

document.getElementById("ding").play();

confetti({
particleCount:150,
spread:80,
origin:{y:0.6}
});

pool=pool.filter(p=>p!==winner);
winners[prize].push(winner);

rolling=false;
}

/* Big screen mode */
function toggleBig(){
document.body.classList.toggle("big");
}

/* Show final winner summary page */
function showEnd(){

document.getElementById("drawPage").style.display="none";
document.getElementById("endPage").style.display="block";

["First Prize","Second Prize","Third Prize"].forEach((p,i)=>{

const el=document.getElementById("list"+(i+1));

winners[p].forEach(n=>{
el.innerHTML+=`<div class="name">${n}</div>`;
});

});
}

/* Background floating particles */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

let w,h,particles=[];

function resize(){
w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;
}

window.onresize=resize;
resize();

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*2+1,
dy:Math.random()*0.3+0.1
});
}

function animateBG(){

ctx.clearRect(0,0,w,h);

ctx.fillStyle="rgba(255,215,150,0.6)";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.y-=p.dy;

if(p.y<0)p.y=h;
});

requestAnimationFrame(animateBG);
}

animateBG();

</script>

</body>
</html>
